site_name: litestar-keycloak
site_description: Keycloak OIDC/OAuth2 authentication plugin for Litestar
site_url: https://github.com/owner/litestar-keycloak

theme:
  name: material

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            members: true

nav:
  - Home: index.md
  - Configuration: configuration.md
  - Guides:
    - Guards: guides/guards.md
    - OIDC routes: guides/oidc-routes.md
    - Service-to-service: guides/service-to-service.md
    - Testing: guides/testing.md
  - API Reference: api.md
